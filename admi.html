<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>

    <style>
        body{
            font-family: Arial;
            background: white;
            color: black;
            padding:20px;
        }

        .dark{
            background: #121212;
            color:white;
        }

        table{
            width: 100%;
            border-collapse:collapse;
        }

        th,td{
            border: 1px solid gray;
            padding: 10px;
            text-align: center;
        }

        input{
            padding:8px;
            margin: 10px 0;
            width:250px;
        }

        button{
            padding: 8px 15px;
            background: green;
            color: white;
            border: none;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <button onclick="toggleDark()">DarkMode</button>

    <h2>Admin Panel</h2>

    <input type="text" id="search" placeholder="Search Student...">

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
        </tr>

        {% for S in students %}
        <tr>
            <td>{{s.id}}</td>
            <td>{{s.name}}</td>
            <td>{{s.email}}</td>
        </tr>

        {% endfor %}
    </table>

    <script>
        //search student
        document.getElementByld("search").addEventListener("keyup",function(){
            let value=this.value.toLowerCase();
            let rows=document.querySelectorAll("table tr");

            rows.forEach((row,index)=>{
                if(index===0)return;

                let text=row.innerText.toLowerCase();
                row.style.display = text.inlcudes(value)?"":"none";
            });
        });

        //DarkMode
        function toggleDark(){
            document.body.classList.toggle("dark");

            if(document.body.classList.contains("dark")){
                localStorage.setItem("theme","dark");
            }else{
                localStorage.setItem("theme","light");
            }
        }

        window.onload=function(){
            if(loacalStorage.getItem("theme")==="dark"){
                document.body.classList.add("dark");
            }
        };
    </script>
</body>
</html>
