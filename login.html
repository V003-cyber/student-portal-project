<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body{
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }

        input{
            padding: 10px;
            margin: 10px;
            width: 250px;
        }

        button{
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
        }
    </style>
</head>
<body>
    <h2>Student Login</h2>

    <form action="/login" method="post">
        <input type="email" name="email" placeholder="Enter Email"required><br>
        <input type="password" name="password" placeholder="Enter Password" required><br>
        <button type="submit">Login</button>
    </form>
</body>
</html>
